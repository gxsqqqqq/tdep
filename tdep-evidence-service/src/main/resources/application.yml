server:
  port: ${TDEP_EVIDENCE_SERVICE_PORT:9003}
  servlet:
    context-path: /

spring:
  application:
    name: tdep-evidence-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TDEP_EVIDENCE_DB_URL:jdbc:mysql://localhost:3306/tdep_evidence?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${TDEP_EVIDENCE_DB_USERNAME:root}
    password: ${TDEP_EVIDENCE_DB_PASSWORD:root}
    hikari:
      pool-name: TdepEvidenceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: ${TDEP_EVIDENCE_SQL_INIT_MODE:always}
      encoding: UTF-8
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: ${TDEP_EVIDENCE_MAX_FILE_SIZE:200MB}
      max-request-size: ${TDEP_EVIDENCE_MAX_REQUEST_SIZE:220MB}
  data:
    redis:
      host: ${TDEP_REDIS_HOST:localhost}
      port: ${TDEP_REDIS_PORT:6379}
      password: ${TDEP_REDIS_PASSWORD:}
      database: ${TDEP_REDIS_DATABASE:2}
      timeout: 3000ms
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tdep.evidence.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tdep:
  evidence:
    storage:
      endpoint: ${TDEP_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${TDEP_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${TDEP_MINIO_SECRET_KEY:minioadmin}
      original-bucket: ${TDEP_MINIO_EVIDENCE_ORIGINAL_BUCKET:tdep-evidence-original}
      sealed-bucket: ${TDEP_MINIO_EVIDENCE_SEALED_BUCKET:tdep-evidence-sealed}
      temp-bucket: ${TDEP_MINIO_EVIDENCE_TEMP_BUCKET:tdep-evidence-temp}
      preview-bucket: ${TDEP_MINIO_EVIDENCE_PREVIEW_BUCKET:tdep-evidence-preview}
      presigned-url-seconds: ${TDEP_MINIO_PRESIGNED_URL_SECONDS:900}
  security:
    jwt:
      issuer: ${TDEP_JWT_ISSUER:tdep}
      secret: ${TDEP_JWT_SECRET:tdep-development-secret-key-please-change-in-production}
      access-token-seconds: ${TDEP_JWT_ACCESS_TOKEN_SECONDS:7200}
      header: Authorization
      token-prefix: "Bearer "
    permit-all-urls:
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tdep: info
    org.springframework.security: info
