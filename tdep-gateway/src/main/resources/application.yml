server:
  port: 8080

spring:
  application:
    name: tdep-gateway
  cloud:
    gateway:
      default-filters:
        # 为所有下游请求增加平台来源标识，便于审计和网关流量识别。
        - AddRequestHeader=X-TDEP-Gateway, tdep-gateway
      routes:
        - id: tdep-auth-service
          uri: http://localhost:9001
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: tdep-user-service
          uri: http://localhost:9002
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: tdep-evidence-service
          uri: http://localhost:9003
          predicates:
            - Path=/api/evidences/**
          filters:
            - StripPrefix=1
        - id: tdep-case-service
          uri: http://localhost:9004
          predicates:
            - Path=/api/cases/**
          filters:
            - StripPrefix=1
        - id: tdep-document-service
          uri: http://localhost:9006
          predicates:
            - Path=/api/document/**,/api/documents/**,/api/template/**
          filters:
            - StripPrefix=1
        - id: tdep-ai-service
          uri: http://localhost:9005
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
        - id: tdep-notify-service
          uri: http://localhost:9007
          predicates:
            - Path=/api/notify/**
          filters:
            - StripPrefix=1

tdep:
  gateway:
    security:
      issuer: tdep
      secret: tdep-development-secret-key-please-change-in-production
      header: Authorization
      token-prefix: "Bearer "
      permit-all-urls:
        - /actuator/health
        - /api/auth/login
        - /api/auth/register

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tdep: info
    org.springframework.cloud.gateway: info
