server:
  port: ${TDEP_AUTH_SERVICE_PORT:9001}
  servlet:
    context-path: /

spring:
  application:
    name: tdep-auth-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TDEP_AUTH_DB_URL:jdbc:mysql://localhost:3306/tdep_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${TDEP_AUTH_DB_USERNAME:root}
    password: ${TDEP_AUTH_DB_PASSWORD:123456}
    hikari:
      pool-name: TdepAuthHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: ${TDEP_AUTH_SQL_INIT_MODE:always}
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  data:
    redis:
      host: ${TDEP_REDIS_HOST:localhost}
      port: ${TDEP_REDIS_PORT:6379}
      password: ${TDEP_REDIS_PASSWORD:}
      database: ${TDEP_REDIS_DATABASE:0}
      timeout: 3000ms
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tdep.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tdep:
  security:
    jwt:
      issuer: ${TDEP_JWT_ISSUER:tdep}
      secret: ${TDEP_JWT_SECRET:tdep-development-secret-key-please-change-in-production}
      access-token-seconds: ${TDEP_JWT_ACCESS_TOKEN_SECONDS:7200}
      header: Authorization
      token-prefix: "Bearer "
    permit-all-urls:
      - /actuator/health
      - /api/auth/login
      - /api/auth/register
      - /auth/login
      - /auth/register

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tdep: info
    org.springframework.security: info
