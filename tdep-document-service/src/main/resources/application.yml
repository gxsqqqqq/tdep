server:
  port: ${TDEP_DOCUMENT_SERVICE_PORT:9006}
  servlet:
    context-path: /

spring:
  application:
    name: tdep-document-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TDEP_DOCUMENT_DB_URL:jdbc:mysql://localhost:3306/tdep_document?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${TDEP_DOCUMENT_DB_USERNAME:root}
    password: ${TDEP_DOCUMENT_DB_PASSWORD:root}
    hikari:
      pool-name: TdepDocumentHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: ${TDEP_DOCUMENT_SQL_INIT_MODE:always}
      encoding: UTF-8
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: ${TDEP_REDIS_HOST:localhost}
      port: ${TDEP_REDIS_PORT:6379}
      password: ${TDEP_REDIS_PASSWORD:}
      database: ${TDEP_REDIS_DATABASE:4}
      timeout: 3000ms
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tdep.document.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tdep:
  document:
    archive:
      auto-enabled: ${TDEP_DOCUMENT_AUTO_ARCHIVE_ENABLED:false}
      cron: ${TDEP_DOCUMENT_AUTO_ARCHIVE_CRON:0 0 2 * * ?}
      batch-size: ${TDEP_DOCUMENT_AUTO_ARCHIVE_BATCH_SIZE:100}
    storage:
      endpoint: ${TDEP_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${TDEP_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${TDEP_MINIO_SECRET_KEY:minioadmin}
      template-bucket: ${TDEP_MINIO_DOCUMENT_TEMPLATE_BUCKET:tdep-document-template}
      word-bucket: ${TDEP_MINIO_DOCUMENT_WORD_BUCKET:tdep-document-word}
      pdf-bucket: ${TDEP_MINIO_DOCUMENT_PDF_BUCKET:tdep-document-pdf}
      signed-bucket: ${TDEP_MINIO_DOCUMENT_SIGNED_BUCKET:tdep-document-signed}
      archive-bucket: ${TDEP_MINIO_DOCUMENT_ARCHIVE_BUCKET:tdep-document-archive}
      presigned-url-seconds: ${TDEP_MINIO_PRESIGNED_URL_SECONDS:900}
  security:
    jwt:
      issuer: ${TDEP_JWT_ISSUER:tdep}
      secret: ${TDEP_JWT_SECRET:tdep-development-secret-key-please-change-in-production}
      access-token-seconds: ${TDEP_JWT_ACCESS_TOKEN_SECONDS:7200}
      header: Authorization
      token-prefix: "Bearer "
    permit-all-urls:
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tdep: info
    org.springframework.security: info
