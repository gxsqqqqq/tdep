server:
  port: 9006
  servlet:
    context-path: /

spring:
  application:
    name: tdep-document-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tdep_document?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    hikari:
      pool-name: TdepDocumentHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 4
      timeout: 3000ms
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tdep.document.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tdep:
  document:
    archive:
      auto-enabled: false
      cron: 0 0 2 * * ?
      batch-size: 100
    storage:
      endpoint: oss-cn-hangzhou.aliyuncs.com
      access-key-id: id
      access-key-secret: scecret
      template-bucket: tdep-document-template
      word-bucket: tdep-document-word
      pdf-bucket: tdep-document-pdf
      signed-bucket: tdep-document-signed
      archive-bucket: tdep-document-archive
      presigned-url-seconds: 900
  security:
    jwt:
      issuer: tdep
      secret: tdep-development-secret-key-please-change-in-production
      access-token-seconds: 7200
      header: Authorization
      token-prefix: "Bearer "
    permit-all-urls:
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tdep: info
    org.springframework.security: info
